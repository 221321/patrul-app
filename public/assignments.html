<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Смены — Патруль Р</title>
<link rel="stylesheet" href="style.css">
<style>
  .emp-wrap{max-width:1000px;margin:0 auto;padding:20px 16px}
  .emp-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:10px}
  .emp-topbar-name{font-size:1.2rem;font-weight:800}
  .emp-nav{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .emp-nav a{color:var(--muted);text-decoration:none;font-size:.95rem}
  .emp-nav a:hover{color:var(--accent)}
  .emp-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0}
  .emp-controls input[type=date],.emp-controls input[type=search]{
    padding:10px 12px;font-size:16px;border:1.5px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);font-family:inherit;
  }
  .emp-controls input[type=search]{flex:1;min-width:200px}
  .emp-count{color:var(--muted);font-size:.9rem;margin-bottom:12px}

  .emp-table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .emp-table th{text-align:left;font-size:.82rem;color:var(--muted);text-transform:uppercase;
    letter-spacing:.04em;padding:12px 14px;border-bottom:1px solid var(--line);background:#FAFBFC}
  .emp-table td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:.95rem}
  .emp-table tr:last-child td{border-bottom:none}
  .emp-row-inactive{opacity:.5}
  .emp-empty{color:var(--muted);text-align:center;padding:50px 0}

  .asg-select{
    width:100%;max-width:280px;padding:8px 10px;font-size:15px;border:1.5px solid var(--line);
    border-radius:8px;background:#FBFCFD;color:var(--ink);font-family:inherit
  }
  .asg-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700}
  .asg-badge.none{background:#EEF0F2;color:var(--muted)}
  .asg-badge.progress{background:var(--ok-soft);color:var(--ok)}
  .asg-badge.done{background:var(--accent-soft);color:var(--accent-dark)}
  .asg-saved{font-size:.8rem;color:var(--ok);margin-left:8px;opacity:0;transition:opacity .2s}
  .asg-saved.show{opacity:1}
</style>
</head>
<body>
  <div class="emp-wrap">
    <div class="emp-topbar">
      <div class="emp-topbar-name">Смены и назначения</div>
      <div class="emp-nav">
        <a href="/dashboard.html">Сводка</a>
        <a href="/photos.html">Фотоотчёты</a>
        <a href="/employees.html">Сотрудники</a>
        <a href="/contractors.html">Контрагенты</a>
        <a href="/objects.html">Объекты</a>
        <a href="/patrols.html">Обходы</a>
        <a href="#" onclick="goHome();return false;">Выйти</a>
      </div>
    </div>

    <div class="emp-controls">
      <input type="date" id="asgDate" onchange="loadData()">
      <input type="search" id="empSearch" placeholder="Поиск по имени сотрудника…" oninput="renderTable()">
    </div>

    <div class="emp-count" id="empCount"></div>
    <table class="emp-table" id="empTable">
      <thead>
        <tr>
          <th>ФИО</th>
          <th>Объект на эту дату</th>
          <th>Статус смены</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="empTbody"></tbody>
    </table>
    <div class="emp-empty hidden" id="empEmpty">Сотрудники не найдены</div>
  </div>

<script>
var allEmployees = [];
var allObjects = [];
var allAssignments = [];
var allShifts = [];

function goHome() {
  localStorage.removeItem('guardId');
  localStorage.removeItem('guardName');
  localStorage.removeItem('guardRole');
  window.location.href = '/';
}

function currentDate() {
  return document.getElementById('asgDate').value;
}

function loadData() {
  var date = currentDate();
  Promise.all([
    fetch('/api/employees').then(function (r) { return r.json(); }),
    fetch('/api/objects').then(function (r) { return r.json(); }),
    fetch('/api/assignments?date=' + date).then(function (r) { return r.json(); }),
    fetch('/api/shifts?date=' + date).then(function (r) { return r.json(); })
  ]).then(function (results) {
    allEmployees = results[0].filter(function (e) { return e.active !== false && e.role !== 'manager'; });
    allObjects = results[1].filter(function (o) { return o.active !== false; });
    allAssignments = results[2];
    allShifts = results[3];
    renderTable();
  });
}

function assignmentFor(guardId) {
  return allAssignments.find(function (a) { return a.guardId === guardId; }) || null;
}

function shiftFor(guardId) {
  return allShifts.find(function (s) { return s.guardId === guardId; }) || null;
}

function renderTable() {
  var query = document.getElementById('empSearch').value.trim().toLowerCase();
  var tbody = document.getElementById('empTbody');
  var empty = document.getElementById('empEmpty');
  var countEl = document.getElementById('empCount');
  var table = document.getElementById('empTable');

  var filtered = query
    ? allEmployees.filter(function (e) { return e.name.toLowerCase().indexOf(query) !== -1; })
    : allEmployees;

  countEl.textContent = allEmployees.length
    ? 'Показано ' + filtered.length + ' из ' + allEmployees.length
    : '';

  tbody.innerHTML = '';
  var hasResults = filtered.length > 0;
  table.classList.toggle('hidden', !hasResults);
  empty.classList.toggle('hidden', hasResults);

  filtered.forEach(function (emp) {
    var tr = document.createElement('tr');

    var tdName = document.createElement('td');
    tdName.textContent = emp.name;

    var tdObject = document.createElement('td');
    var select = document.createElement('select');
    select.className = 'asg-select';
    var currentAssignment = assignmentFor(emp.id);

    var noneOption = document.createElement('option');
    noneOption.value = '';
    noneOption.textContent = 'Не назначен';
    select.appendChild(noneOption);

    allObjects.forEach(function (o) {
      var opt = document.createElement('option');
      opt.value = o.id;
      opt.textContent = o.name;
      if (currentAssignment && currentAssignment.objectId === o.id) opt.selected = true;
      select.appendChild(opt);
    });

    select.onchange = function () { saveAssignment(emp.id, select.value, select); };
    tdObject.appendChild(select);

    var saved = document.createElement('span');
    saved.className = 'asg-saved';
    saved.textContent = 'Сохранено';
    saved.id = 'saved-' + emp.id;
    tdObject.appendChild(saved);

    var tdStatus = document.createElement('td');
    var shift = shiftFor(emp.id);
    var badge = document.createElement('span');
    if (shift && !shift.endedAt) {
      badge.className = 'asg-badge progress';
      badge.textContent = 'На смене';
    } else if (shift && shift.endedAt) {
      badge.className = 'asg-badge done';
      badge.textContent = 'Смена завершена';
    } else {
      badge.className = 'asg-badge none';
      badge.textContent = 'Не начата';
    }
    tdStatus.appendChild(badge);

    var tdSpacer = document.createElement('td');

    tr.appendChild(tdName);
    tr.appendChild(tdObject);
    tr.appendChild(tdStatus);
    tr.appendChild(tdSpacer);
    tbody.appendChild(tr);
  });
}

function saveAssignment(guardId, objectId, selectEl) {
  fetch('/api/assignments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ guardId: guardId, objectId: objectId, date: currentDate() })
  })
    .then(function (r) { return r.json(); })
    .then(function () {
      loadData();
      var savedEl = document.getElementById('saved-' + guardId);
      if (savedEl) {
        savedEl.classList.add('show');
        setTimeout(function () { savedEl.classList.remove('show'); }, 1500);
      }
    });
}

document.getElementById('asgDate').value = new Date().toISOString().slice(0, 10);
loadData();
</script>
</body>
</html>
